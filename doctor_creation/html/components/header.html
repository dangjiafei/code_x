<!-- 顶部导航栏 -->
<header class="top-header">
    <div class="header-left">
        <div class="logo">
            <span class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </span>
            <span class="logo-text">趣学术 · 创作者中心</span>
        </div>
    </div>

    <div class="header-right">
        <!-- 刷新按钮 -->
        <div class="refresh-btn" onclick="location.reload()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M2.5 22v-6h6"></path>
                <path d="M2 12a10 10 0 0 0 20 0 10 10 0 0 0-20 0z"></path>
            </svg>
        </div>

        <!-- 个人中心 -->
        <div class="user-center">
            <div class="user-info-dropdown">
                <div class="user-avatar">
                    <div class="avatar">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                    </div>
                    <div class="dropdown-icon">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
